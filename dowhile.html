<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
var table=window.prompt("Enter the table to be printed")
var a = 1
while (a <= 10)
{
document.write(table*a)
document.write("<br>")
a++
}
</script>
</body>
</html>
